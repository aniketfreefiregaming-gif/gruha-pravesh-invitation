<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniket's New Home | Invitation</title>
    <!-- Importing a premium font for that real website look -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --dark: #0f0f0f;
            --cream: #f4f1ea;
            --accent: #8b0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--dark);
            font-family: 'Poppins', sans-serif;
            color: #333;
            overflow-x: hidden;
        }

        /* SCREEN 1: THE ENTRY GATEWAY */
        #gate-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('welcome.jpg') center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }

        .welcome-title {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .enter-btn {
            padding: 15px 50px;
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.3s;
        }

        .enter-btn:hover {
            background: var(--gold);
            color: white;
            box-shadow: 0 0 25px rgba(197, 160, 89, 0.4);
        }

        /* SCREEN 2: THE MAIN RECTANGLE */
        #invitation-container {
            display: none; /* Hidden until button click */
            width: 100%; min-height: 100vh;
            padding: 50px 20px;
            display: flex; justify-content: center; align-items: center;
        }

        .main-card {
            background: var(--cream);
            width: 100%; max-width: 1100px;
            display: flex; /* Forces PC Side-by-Side */
            border: 1px solid var(--gold);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            position: relative;
        }

        /* LEFT SIDE (Vertical stack of 2 photos) */
        .left-half {
            flex: 1;
            display: flex; flex-direction: column;
            border-right: 2px solid var(--gold);
        }

        .left-half img {
            width: 100%; height: 50%; object-fit: cover;
            display: block;
        }

        /* RIGHT SIDE (The Journey) */
        .right-half {
            flex: 1;
            position: relative;
            background: #e5e2d9; /* Matches journey background */
        }

        .right-half img {
            width: 100%; height: 100%; object-fit: cover;
            display: block;
        }

        /* FLOATING NAVIGATION BUTTONS */
        .map-overlay {
            position: absolute;
            top: 20px; right: 20px;
            z-index: 10;
        }

        .map-button {
            background: var(--accent);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.8rem;
            display: inline-flex; align-items: center; gap: 8px;
            border: 2px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .contact-bar {
            position: absolute;
            bottom: 0; width: 100%;
            background: rgba(0,0,0,0.8);
            color: var(--gold);
            text-align: center;
            padding: 15px;
            font-size: 0.8rem;
            font-family: 'Cinzel', serif;
        }

        /* MOBILE FIX: When on phone, make it one column */
        @media (max-width: 850px) {
            .main-card { flex-direction: column; }
            .left-half { border-right: none; border-bottom: 2px solid var(--gold); }
            .left-half img { height: auto; }
            .right-half { min-height: 400px; }
            #invitation-container { padding: 0; }
        }
    </style>
</head>
<body>

    <!-- GATEWAY SECTION -->
    <div id="gate-screen">
        <h1 class="welcome-title">Invitation</h1>
        <button class="enter-btn" onclick="openInvitation()">View Details</button>
    </div>

    <!-- MAIN RECTANGLE SECTION -->
    <div id="invitation-container" style="display:none;">
        <div class="main-card">
            
            <!-- LEFT PANEL: Photos 1 and 2 -->
            <div class="left-half">
                <img src="welcome.jpg" alt="Welcome to Our Home">
                <img src="ceremony.jpg" alt="House Warming Ceremony">
            </div>

            <!-- RIGHT PANEL: Your Journey -->
            <div class="right-half">
                <div class="map-overlay">
                    <a href="https://maps.google.com/?q=Nigdi+Pune" target="_blank" class="map-button">
                        📍 NAVIGATE TO HOME
                    </a>
                </div>

                <!-- This is your journey.jpg which holds the "Our Journey" design -->
                <img src="journey.jpg" alt="Our Journey Timeline">

                <div class="contact-bar">
                    MAY 24, 2026 | +91 90217 61646
                </div>
            </div>

        </div>
    </div>

    <script>
        function openInvitation() {
            const gate = document.getElementById('gate-screen');
            const main = document.getElementById('invitation-container');

            // Slide the gate up
            gate.style.transform = 'translateY(-100%)';
            
            // Show the invitation
            setTimeout(() => {
                gate.style.display = 'none';
                main.style.display = 'flex';
                window.scrollTo(0, 0);
            }, 800);
        }
    </script>
</body>
</html>
