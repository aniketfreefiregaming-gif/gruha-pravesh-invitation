<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniket's Gruha Pravesh Invitation</title>
    <style>
        /* 
           CSS STYLING SECTION 
           This section defines the visual "look and feel" of the website.
        */
        :root {
            --primary-gold: #b38728;
            --background-cream: #fdfaf1;
            --accent-red: #800000;
            --deep-dark: #0a0a0a;
            --overlay-shadow: rgba(0, 0, 0, 0.7);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--deep-dark);
            font-family: 'Playfair Display', 'Georgia', serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* 
           SELECTION SCREEN 
           This is the first thing the user sees. It acts as a gateway.
        */
        #selection-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(var(--overlay-shadow), var(--overlay-shadow)), 
                        url('welcome.jpg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-in-out;
        }

        .welcome-text {
            color: var(--primary-gold);
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.8);
        }

        .lang-button-container {
            display: flex;
            gap: 20px;
        }

        .btn-elegant {
            padding: 18px 45px;
            background: transparent;
            border: 2px solid var(--primary-gold);
            color: var(--primary-gold);
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.4s ease;
            letter-spacing: 2px;
            backdrop-filter: blur(5px);
        }

        .btn-elegant:hover {
            background-color: var(--primary-gold);
            color: white;
            box-shadow: 0 0 20px var(--primary-gold);
            transform: translateY(-3px);
        }

        /* 
           MAIN CONTENT RECTANGLE 
           This is the "Real Site" layout you requested. 
        */
        #main-site-container {
            display: none; /* Hidden until button click */
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .invitation-card {
            width: 100%;
            max-width: 1200px;
            background-color: var(--background-cream);
            border: 10px double var(--primary-gold);
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            display: flex; /* Flex container for side-by-side layout */
            flex-direction: row;
            overflow: hidden;
            position: relative;
        }

        /* Left side container for welcome and ceremony */
        .card-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 4px solid var(--primary-gold);
        }

        .card-left img {
            width: 100%;
            height: 50%; /* Each takes half the height of the left column */
            object-fit: cover;
            display: block;
        }

        /* Right side container for the Journey */
        .card-right {
            flex: 1;
            position: relative;
            background-color: #d4d8c5; /* Theme matching color */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .journey-full-image {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures your journey image fills the rectangle */
            display: block;
        }

        /* Floating Open Map Button */
        .map-trigger {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 100;
        }

        .map-btn {
            background-color: var(--accent-red);
            color: white;
            padding: 14px 28px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 2px solid white;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .map-btn:hover {
            transform: scale(1.1);
            background-color: #a00000;
        }

        .footer-info {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.8);
            color: var(--primary-gold);
            text-align: center;
            padding: 15px;
            font-size: 0.85rem;
            border-top: 1px solid var(--primary-gold);
        }

        /* 
           MOBILE RESPONSIVENESS 
           This ensures the site looks good on phones too.
        */
        @media (max-width: 900px) {
            .invitation-card {
                flex-direction: column;
                border-width: 5px;
            }
            .card-left {
                border-right: none;
                border-bottom: 4px solid var(--primary-gold);
            }
            .card-left img {
                height: auto;
            }
            .map-trigger {
                top: 15px;
                right: 15px;
            }
            #main-site-container {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- Language selection view -->
    <section id="selection-screen">
        <div class="welcome-text">New Home Celebration</div>
        <div class="lang-button-container">
            <button class="btn-elegant" onclick="initiateSite()">English</button>
            <button class="btn-elegant" onclick="initiateSite()">Marathi</button>
        </div>
    </section>

    <!-- Main site view -->
    <main id="main-site-container" style="display:none;">
        <div class="invitation-card">
            
            <!-- LEFT SECTION: WELCOME & CEREMONY -->
            <div class="card-left">
                <img src="welcome.jpg" alt="Welcome Image">
                <img src="ceremony.jpg" alt="Ceremony Image">
            </div>

            <!-- RIGHT SECTION: JOURNEY (Contains journey.jpg) -->
            <div class="card-right">
                <!-- Floating Map Button -->
                <div class="map-trigger">
                    <a href="https://maps.google.com/?q=Nigdi+Pune" target="_blank" class="map-btn">
                        📍 OPEN GOOGLE MAPS
                    </a>
                </div>

                <!-- Your Journey Image -->
                <img src="journey.jpg" class="journey-full-image" alt="Our Journey">

                <!-- Subtle Overlay Footer for Contact -->
                <div class="footer-info">
                    <strong>RSVP: +91 90217 61646</strong> | May 24, 2026
                </div>
            </div>

        </div>
    </main>

    <script>
        /**
         * Function: initiateSite
         * Purpose: Handles the transition from the landing page to the main invitation.
         */
        function initiateSite() {
            const gate = document.getElementById('selection-screen');
            const content = document.getElementById('main-site-container');

            // Fade out the selection screen
            gate.style.opacity = '0';
            
            setTimeout(() => {
                gate.style.display = 'none';
                content.style.display = 'flex';
                
                // Animate the card entry
                const card = document.querySelector('.invitation-card');
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                
                setTimeout(() => {
                    card.style.transition = 'all 1s ease-out';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, 100);

                window.scrollTo(0, 0);
            }, 800);
        }

        // Error handling for images
        window.addEventListener('load', function() {
            const imgs = document.getElementsByTagName('img');
            for(let img of imgs) {
                img.onerror = function() {
                    console.error("Failed to load image: " + img.src);
                    this.style.background = "#ddd";
                    this.alt = "Image not found - please check file name";
                };
            }
        });
    </script>
</body>
</html>
