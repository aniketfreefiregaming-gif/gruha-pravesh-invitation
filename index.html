<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gruha Pravesh Invitation</title>
    <style>
        :root {
            --gold: #b38728;
            --cream: #fdfaf1;
            --dark-bg: #121212;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Selection Screen */
        #selection-screen {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('welcome.jpg') center/cover;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 999; /* Higher z-index to stay on top */
        }

        .lang-btn {
            padding: 15px 40px;
            margin: 10px;
            border: 2px solid var(--gold);
            background: rgba(0,0,0,0.5);
            color: var(--gold);
            font-size: 1.2rem;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            z-index: 1000;
        }

        .lang-btn:hover { background: var(--gold); color: white; }

        /* Main Site Horizontal Container */
        #main-site {
            display: none; /* Initially Hidden */
            width: 95%;
            max-width: 1200px;
            background-color: var(--cream);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border: 4px solid var(--gold);
            overflow: hidden;
            margin: 20px auto;
        }

        .layout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .left-side {
            display: flex;
            flex-direction: column;
            border-right: 2px solid var(--gold);
        }

        .left-side img {
            width: 100%;
            display: block;
        }

        .right-side {
            position: relative;
            background-color: #d4d8c5;
            display: flex;
            flex-direction: column;
        }

        .journey-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .location-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
        }

        .loc-btn {
            background-color: #800000;
            color: white;
            padding: 10px 18px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.8rem;
            border: 1px solid white;
        }

        .footer {
            padding: 20px;
            text-align: center;
            background: #000;
            color: var(--gold);
            width: 100%;
        }

        @media (max-width: 850px) {
            .layout-grid { grid-template-columns: 1fr; }
            #main-site { width: 100%; margin: 0; border: none; }
            .left-side { border-right: none; }
        }
    </style>
</head>
<body>

    <!-- Select Language Screen -->
    <div id="selection-screen">
        <h2 style="color: var(--gold); margin-bottom: 20px; text-shadow: 2px 2px 4px #000;">Select Language</h2>
        <button type="button" class="lang-btn" onclick="showSite('en')">ENGLISH</button>
        <button type="button" class="lang-btn" onclick="showSite('mr')">MARATHI</button>
    </div>

    <!-- The Invitation Content -->
    <div id="main-site">
        <div class="layout-grid">
            
            <div class="left-side">
                <img src="welcome.jpg" alt="Welcome">
                <img src="ceremony.jpg" alt="Ceremony">
            </div>

            <div class="right-side">
                <div class="location-overlay">
                    <a href="https://maps.google.com/?q=Nigdi+Pune" target="_blank" class="loc-btn">
                        📍 OPEN MAP
                    </a>
                </div>
                <!-- Reference to your journey collage -->
                <img src="1000389968.jpg" class="journey-img" alt="Our Journey">
                
                <div class="footer">
                    <strong>Contact: +91 90217 61646</strong><br>
                    <small>© 2026 | New Home Celebration</small>
                </div>
            </div>

        </div>
    </div>

    <script>
        function showSite(lang) {
            console.log("Button clicked, showing site for: " + lang);
            
            // 1. Hide the selection screen
            const selection = document.getElementById('selection-screen');
            selection.style.display = 'none';
            
            // 2. Show the main site
            const main = document.getElementById('main-site');
            main.style.display = 'block';
            
            // 3. Reset scroll to top
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
