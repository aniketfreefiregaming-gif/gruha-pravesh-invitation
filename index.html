<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gruha Pravesh Invitation</title>
    <style>
        :root {
            --gold: #b38728;
            --cream: #fdfaf1;
            --dark-bg: #121212;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Selection Screen */
        #selection-screen {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('welcome.jpg') center/cover;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .lang-btn {
            padding: 15px 40px;
            margin: 10px;
            border: 2px solid var(--gold);
            background: rgba(0,0,0,0.5);
            color: var(--gold);
            font-size: 1.2rem;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .lang-btn:hover { background: var(--gold); color: white; }

        /* The Main Rectangle Layout */
        #main-site {
            display: none;
            width: 95%;
            max-width: 1100px;
            background-color: var(--cream);
            border: 6px solid var(--gold);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        .layout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Equal left and right sides */
            align-items: stretch;
        }

        /* Left Column: Welcome and Ceremony */
        .left-side {
            display: flex;
            flex-direction: column;
            border-right: 3px solid var(--gold);
        }

        .left-side img {
            width: 100%;
            display: block;
            flex: 1; /* Makes both images take equal height */
            object-fit: cover;
        }

        /* Right Column: Your existing journey.jpg */
        .right-side {
            position: relative;
            background-color: #d4d8c5; /* Matches the theme of journey.jpg */
        }

        .right-side img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        /* Map Button (Styled like image 1000390096.jpg) */
        .location-overlay {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 10;
        }

        .loc-btn {
            background-color: #800000;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.85rem;
            border: 1px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .footer {
            background: #000;
            color: var(--gold);
            padding: 15px;
            text-align: center;
            font-size: 0.9rem;
        }

        /* Mobile View: Stacks them vertically */
        @media (max-width: 850px) {
            .layout-grid { grid-template-columns: 1fr; }
            .left-side { border-right: none; border-bottom: 3px solid var(--gold); }
            #main-site { width: 100%; margin: 0; border-width: 3px; }
        }
    </style>
</head>
<body>

    <div id="selection-screen">
        <h2 style="color: var(--gold); margin-bottom: 20px; text-shadow: 2px 2px 5px #000;">Select Language</h2>
        <button type="button" class="lang-btn" onclick="showSite()">ENGLISH</button>
        <button type="button" class="lang-btn" onclick="showSite()">MARATHI</button>
    </div>

    <div id="main-site">
        <div class="layout-grid">
            
            <!-- LEFT SIDE: Welcome and Ceremony images -->
            <div class="left-side">
                <img src="welcome.jpg" alt="Welcome">
                <img src="ceremony.jpg" alt="Ceremony">
            </div>

            <!-- RIGHT SIDE: Your journey.jpg (with Map button) -->
            <div class="right-side">
                <div class="location-overlay">
                    <a href="https://maps.google.com/?q=Nigdi+Pune" target="_blank" class="loc-btn">
                        📍 OPEN MAP
                    </a>
                </div>
                <img src="journey.jpg" alt="Our Journey">
            </div>

        </div>

        <div class="footer">
            <strong>Contact: +91 90217 61646</strong> | © 2026 New Home
        </div>
    </div>

    <script>
        function showSite() {
            // Hide selection, show main content
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
