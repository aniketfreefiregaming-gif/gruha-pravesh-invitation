<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gruha Pravesh Invitation</title>
    <style>
        :root {
            --gold: #b38728;
            --cream: #fdfaf1;
            --dark-bg: #121212;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            font-family: 'Georgia', serif;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Selection Screen */
        #selection-screen {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('welcome.jpg') center/cover;
            position: fixed;
            z-index: 100;
            top: 0; left: 0;
        }

        .lang-btn {
            padding: 15px 40px;
            margin: 10px;
            border: 2px solid var(--gold);
            background: transparent;
            color: var(--gold);
            font-size: 1.2rem;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .lang-btn:hover { background: var(--gold); color: white; }

        /* Main Site Horizontal Container */
        #main-site {
            display: none;
            width: 95%;
            max-width: 1200px;
            height: auto;
            background-color: var(--cream);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border: 8px solid var(--gold);
            overflow: hidden;
        }

        /* The Grid: Left side for details, Right side for Journey */
        .layout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Two perfect halves */
            min-height: 600px;
        }

        /* Left Column */
        .left-side {
            display: flex;
            flex-direction: column;
            border-right: 2px solid var(--gold);
        }

        .left-side img {
            width: 100%;
            height: 50%; /* Half for welcome, half for ceremony */
            object-fit: cover;
        }

        /* Right Column */
        .right-side {
            position: relative;
            background-color: #d4d8c5; /* Matches the green tint in 1000389968.jpg */
            display: flex;
            flex-direction: column;
        }

        .journey-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Map Button Positioning */
        .location-overlay {
            position: absolute;
            top: 40px;
            right: 40px;
            z-index: 10;
        }

        .loc-btn {
            background-color: #800000;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border: 1px solid white;
        }

        /* Responsive: Stacks on small phones */
        @media (max-width: 850px) {
            .layout-grid { grid-template-columns: 1fr; }
            #main-site { margin: 20px 0; height: auto; }
            .left-side { border-right: none; border-bottom: 2px solid var(--gold); }
        }
    </style>
</head>
<body>

    <div id="selection-screen">
        <h2 style="color: var(--gold); margin-bottom: 20px;">Welcome to Our New Home</h2>
        <button class="lang-btn" onclick="showSite()">ENGLISH</button>
        <button class="lang-btn" onclick="showSite()">MARATHI</button>
    </div>

    <div id="main-site">
        <div class="layout-grid">
            
            <!-- Left Side: Photos 1 and 2 -->
            <div class="left-side">
                <img src="welcome.jpg" alt="Welcome">
                <img src="ceremony.jpg" alt="Ceremony">
            </div>

            <!-- Right Side: Journey and Map (Reference: 1000389968.jpg) -->
            <div class="right-side">
                <div class="location-overlay">
                    <a href="https://maps.google.com/?q=Nigdi+Pune" target="_blank" class="loc-btn">
                        📍 VIEW LOCATION
                    </a>
                </div>
                <!-- This image contains the 'Our Journey' collage -->
                <img src="1000389968.jpg" class="journey-img" alt="Our Journey">
                
                <div style="padding: 20px; text-align: center; background: #000; color: var(--gold);">
                    <strong>Contact: +91 90217 61646</strong>
                </div>
            </div>

        </div>
    </div>

    <script>
        function showSite() {
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
        }
    </script>
</body>
</html>
