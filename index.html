<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gruh Pravesh</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Poppins',sans-serif;background:#f8f3ec;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;overflow:hidden;}

    /* 1. Language Selection (Visible First) */
    .language-box {
        background: white;
        padding: 50px 40px;
        border-radius: 24px;
        border: 1px solid #eadcc8;
        text-align: center;
        width: 100%;
        max-width: 500px;
        z-index: 10;
        transition: opacity 0.5s ease;
    }

    h1{font-family:'Cormorant Garamond',serif;font-size:3rem;color:#4a2412;margin-bottom:14px;}
    p{color:#5c5146;margin-bottom:36px;line-height:1.7;}
    
    /* Buttons */
    .btn {
        display: block;
        width: 100%;
        padding: 18px;
        margin-bottom: 16px;
        border-radius: 14px;
        text-decoration: none;
        font-size: 1rem;
        font-weight: 500;
        text-align: center;
        cursor: pointer;
        border: none;
        transition: 0.3s;
    }
    .english-btn { background: #a96a22; color: white; }
    .marathi-btn { background: white; border: 1px solid #d7b68f; color: #7c4d17; }

    /* 2. Ganpati Photo Overlay (Hidden initially) */
    #bappa-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        display: none; /* Hidden */
        justify-content: center;
        align-items: center;
        z-index: 100;
        opacity: 0;
        transition: opacity 1s ease-in-out;
    }
    #bappa-overlay img {
        max-width: 85%;
        max-height: 75vh;
        border-radius: 20px;
    }
</style>
</head>
<body>

<div class="language-box" id="langBox">
    <h1>Welcome</h1>
    <p>Please select your preferred language</p>
    <button onclick="showBappa('english.html')" class="btn english-btn">English</button>
    <button onclick="showBappa('marathi.html')" class="btn marathi-btn">मराठी</button>
</div>

<div id="bappa-overlay">
    <img src="ganpati.jpg" alt="Ganpati Bappa">
</div>

<script>
    function showBappa(nextPage) {
        const langBox = document.getElementById('langBox');
        const overlay = document.getElementById('bappa-overlay');

        // Hide the buttons
        langBox.style.opacity = '0';

        setTimeout(() => {
            langBox.style.display = 'none';
            
            // Show the Bappa Image
            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.style.opacity = '1';
            }, 50);

            // STEP 3: Wait 3 seconds, then open the website page
            setTimeout(() => {
                window.location.href = nextPage;
            }, 3000); 

        }, 500);
    }
</script>

</body>
</html>
