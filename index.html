<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gruha Pravesh Invitation</title>
    <style>
        :root {
            --gold: #b38728;
            --cream: #fdfaf1;
            --dark: #1a1a1a;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--dark);
            font-family: 'Georgia', serif;
            color: #333;
        }

        /* Selection Screen */
        #selection-screen {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('welcome.jpg') center/cover;
            position: fixed;
            z-index: 1000;
            text-align: center;
        }

        .lang-btn {
            padding: 15px 40px;
            margin: 10px;
            border: 2px solid var(--gold);
            background: transparent;
            color: var(--gold);
            font-size: 1.1rem;
            cursor: pointer;
            width: 220px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* The Main Rectangle Container - FORCED PC VIEW ON MOBILE */
        #main-site {
            display: none;
            width: 1000px; /* Forces wide PC layout even on mobile */
            margin: 20px auto;
            background-color: var(--cream);
            border: 8px solid var(--gold);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            transform-origin: top left;
        }

        .layout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Two perfect halves */
        }

        /* Left side with 2 photos */
        .left-side {
            display: flex;
            flex-direction: column;
            border-right: 4px solid var(--gold);
        }

        .left-side img {
            width: 100%;
            display: block;
        }

        /* Right side with Journey.jpg */
        .right-side {
            position: relative;
            background-color: #d4d8c5;
        }

        .journey-img {
            width: 100%;
            display: block;
        }

        /* Locate Button & Contact Icon */
        .overlay-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 15px;
        }

        .loc-btn {
            background-color: #800000;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.9rem;
            border: 2px solid white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .contact-icon {
            background-color: #25D366; /* WhatsApp Green */
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 1.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 2px solid white;
        }

        .footer {
            background: #000;
            color: var(--gold);
            padding: 20px;
            text-align: center;
            font-size: 1.1rem;
        }

        /* Scaling for Mobile Screens so the big rectangle fits */
        @media (max-width: 1000px) {
            body {
                overflow-x: auto;
            }
            #main-site {
                transform: scale(0.38); /* Shrinks the 1000px box to fit phone width */
                transform-origin: top center;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- Language Selection -->
    <div id="selection-screen">
        <h2 id="select-title" style="color: var(--gold); margin-bottom: 20px;">Select Language / भाषा निवडा</h2>
        <button class="lang-btn" onclick="showSite('en')">ENGLISH</button>
        <button class="lang-btn" onclick="showSite('mr')">मराठी</button>
    </div>

    <!-- Main Content -->
    <div id="main-site">
        <div class="layout-grid">
            
            <div class="left-side">
                <img src="welcome.jpg" alt="Welcome">
                <img src="ceremony.jpg" alt="Ceremony">
            </div>

            <div class="right-side">
                <div class="overlay-controls">
                    <a href="https://maps.google.com/?q=Nigdi+Pune" target="_blank" class="loc-btn">
                        📍 <span id="map-text">OPEN MAP</span>
                    </a>
                    <!-- WhatsApp Contact Icon -->
                    <a href="https://wa.me/919021761646" class="contact-icon">
                        📞
                    </a>
                </div>
                
                <img src="journey.jpg" class="journey-img" alt="Journey">
            </div>

        </div>

        <div class="footer">
            <span id="footer-text">Contact: +91 90217 61646 | Invitation for New Home</span>
        </div>
    </div>

    <script>
        function showSite(lang) {
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';

            // Change text based on language
            if (lang === 'mr') {
                document.getElementById('map-text').innerText = "नकाशा उघडा";
                document.getElementById('footer-text').innerText = "संपर्क: +९१ ९०२१७ ६१६४६ | गृहप्रवेश आमंत्रण";
            } else {
                document.getElementById('map-text').innerText = "OPEN MAP";
                document.getElementById('footer-text').innerText = "Contact: +91 90217 61646 | Invitation for New Home";
            }
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
