<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gruha Pravesh Invitation</title>
    <style>
        :root {
            --gold: #b38728;
            --cream: #fdfaf1;
            --dark: #1a1a1a;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--dark);
            font-family: 'Georgia', serif;
            color: #333;
        }

        /* Selection Screen */
        #selection-screen {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('welcome.jpg') center/cover;
            position: fixed;
            z-index: 100;
            text-align: center;
        }

        .lang-btn {
            padding: 15px 40px;
            margin: 10px;
            border: 2px solid var(--gold);
            background: transparent;
            color: var(--gold);
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            width: 200px;
            letter-spacing: 2px;
        }

        .lang-btn:hover {
            background: var(--gold);
            color: white;
        }

        /* Main Website Container */
        #main-site {
            display: none;
            max-width: 900px; /* Wider to allow side-by-side elements */
            margin: 0 auto;
            background-color: var(--cream);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .hero-section img {
            width: 100%;
            display: block;
        }

        /* The "Side-by-Side" Grid */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Two columns */
            gap: 0;
            border-top: 2px solid var(--gold);
            border-bottom: 2px solid var(--gold);
        }

        .grid-item {
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(179, 135, 40, 0.2);
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Location Button overlaying the Ceremony/Journey image */
        .map-overlay {
            position: absolute;
            top: 20%;
            right: 10%;
            z-index: 10;
        }

        .loc-btn {
            background-color: #800000; /* Deep red like in image 1000390096.jpg */
            color: white;
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            border: 1px solid var(--gold);
        }

        /* Journey Section (Full Width) */
        .journey-section img {
            width: 100%;
            display: block;
        }

        .footer {
            background: #000;
            color: var(--gold);
            padding: 40px 20px;
            text-align: center;
            font-size: 0.9rem;
            border-top: 3px solid var(--gold);
        }

        /* Responsive Fix for Mobile */
        @media (max-width: 600px) {
            .content-grid {
                grid-template-columns: 1fr; /* Stack them on mobile */
            }
            #main-site {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div id="selection-screen">
        <h1 style="color: var(--gold); font-size: 2.5rem; margin-bottom: 30px;">Welcome</h1>
        <button class="lang-btn" onclick="showSite()">ENGLISH</button>
        <button class="lang-btn" onclick="showSite()">MARATHI</button>
    </div>

    <div id="main-site">
        <!-- Top Hero Image -->
        <div class="hero-section">
            <img src="welcome.jpg" alt="Welcome Image">
        </div>

        <!-- Side-by-Side Section -->
        <div class="content-grid">
            <div class="grid-item">
                <img src="ceremony.jpg" alt="Ceremony Details">
            </div>
            <div class="grid-item">
                <div class="map-overlay">
                    <a href="https://maps.google.com/?q=Nigdi+Pune" target="_blank" class="loc-btn">
                        📍 OPEN MAP
                    </a>
                </div>
                <img src="journey.jpg" alt="Map Area">
            </div>
        </div>

        <!-- Full Journey/Gallery Section -->
        <div class="journey-section">
            <!-- If you have a separate gallery image, put it here -->
            <img src="1000390096.jpg" alt="Our Journey">
        </div>

        <div class="footer">
            <p style="letter-spacing: 1px;">WE LOOK FORWARD TO YOUR PRESENCE</p>
            <hr style="width: 50px; border-color: var(--gold);">
            <strong>Contact: +91 90217 61646</strong><br>
            <span style="font-size: 0.7rem; opacity: 0.7;">© 2026 | New Home Celebration</span>
        </div>
    </div>

    <script>
        function showSite() {
            document.getElementById('selection-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('selection-screen').style.display = 'none';
                document.getElementById('main-site').style.display = 'block';
                window.scrollTo(0, 0);
            }, 500);
        }
    </script>
</body>
</html>
