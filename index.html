<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gruh Pravesh</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
        font-family: 'Poppins', sans-serif; 
        background: #f8f3ec; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        min-height: 100vh; 
        padding: 20px; 
        overflow: hidden; 
    }

    /* Splash Screen Styles */
    #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 100;
        transition: opacity 1s ease-in-out;
    }
    #splash-screen img {
        max-width: 80%;
        max-height: 70vh;
        border-radius: 20px;
    }

    /* Language Box Styles */
    .language-box {
        background: white;
        padding: 50px 40px;
        border-radius: 24px;
        border: 1px solid #eadcc8;
        text-align: center;
        width: 100%;
        max-width: 500px;
        opacity: 0; /* Hidden initially */
        transform: translateY(20px);
        transition: all 1s ease-in-out;
    }

    /* Class to trigger the fade-in animation */
    .show-content {
        opacity: 1;
        transform: translateY(0);
    }

    h1 { font-family: 'Cormorant Garamond', serif; font-size: 3rem; color: #4a2412; margin-bottom: 14px; }
    p { color: #5c5146; margin-bottom: 36px; line-height: 1.7; }
    .btn { display: block; width: 100%; padding: 18px; margin-bottom: 16px; border-radius: 14px; text-decoration: none; font-size: 1rem; font-weight: 500; transition: 0.3s; }
    .english-btn { background: #a96a22; color: white; }
    .marathi-btn { background: white; border: 1px solid #d7b68f; color: #7c4d17; }
</style>
</head>
<body>

<!-- Step 1: The Ganpati Image Overlay -->
<div id="splash-screen">
    <img src="ganpati.jpg" alt="Ganpati Bappa">
</div>

<!-- Step 2: The Language Selection -->
<div class="language-box" id="main-content">
    <h1>Welcome</h1>
    <p>Please select your preferred language</p>
    <a href="english.html" class="btn english-btn">English</a>
    <a href="marathi.html" class="btn marathi-btn">मराठी</a>
</div>

<script>
    // This script waits 3 seconds, fades out the image, and shows the buttons
    window.onload = function() {
        setTimeout(function() {
            const splash = document.getElementById('splash-screen');
            const content = document.getElementById('main-content');
            
            // Hide the image
            splash.style.opacity = '0';
            
            // Show the language box
            content.classList.add('show-content');

            // Remove splash from DOM after fade out to allow clicks
            setTimeout(() => {
                splash.style.display = 'none';
            }, 1000); 
        }, 3000); // 3000ms = 3 seconds. Change this to make it faster or slower!
    };
</script>

</body>
</html>
